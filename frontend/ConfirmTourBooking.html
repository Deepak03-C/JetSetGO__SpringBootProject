<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JetSetGo</title>
<link rel="shortcut icon" href="./assest/travelling.jpg" type="image/x-icon">
<link rel="stylesheet" href="./css/ConfirmTourBooking.css">
</head>
<body>

    <div>
        <header>
            <h1 id="title">JetSetGo</h1>
            <div id="navigation">
                <nav id="nav">
                    <a href="UserHome.html">Home</a>
                    <a href="usercompany.html">Company</a>
                    <a href="UserTour.html">TourPackage</a>
                    <a href="UserHotel.html">Hotels</a>
                    <a href="UserContact.html">Contact</a>
                    <a href="#" id="navLogout" style="display:none;" onclick="logout()">Logout</a>
                    <a href="index.html" id="navLogin">Login|SignUp</a>
                </nav>
            </div>
        </header>
    </div>

    <div id="backbutton">
        <a href="javascript:history.back()" id="back">Back&gt;&gt;</a>
    </div>

    <div id="bookingform">
        <section id="video">
            <video loop muted autoplay id="video1">
                <source src="./assest/AirBaloon.mp4">
            </video>
        </section>
        <section id="bookform">
            <h1>Tour Booking - Confirm</h1>
            <form id="confirmTourForm" onsubmit="handleConfirm(event)">
                <label>Booking Person Name :</label>
                <input type="text" id="cfName" readonly> <br><br>
                <label>Person Contact Number:</label>
                <input type="text" id="cfContact"> <br><br>
                <label>Journey Date:</label>
                <input type="date" id="cfDate"> <br><br>
                <label>Number of Persons:</label>
                <input type="text" id="cfPersons"> <br><br>
                <label>Place :</label>
                <input type="text" id="cfPlace" readonly> <br><br>
                <label>Days :</label>
                <input type="text" id="cfDays" readonly> <br><br>
                <p id="confirmMsg" style="color:red;"></p>
                <input type="submit" value="Book Now" id="booknow">
            </form>
        </section>
    </div>

    <script src="./js/api.js"></script>
    <script>
        if (localStorage.getItem('userLoggedIn')) {
            document.getElementById('navLogout').style.display = 'inline';
            document.getElementById('navLogin').style.display = 'none';
        }
        function logout() {
            localStorage.removeItem('userLoggedIn');
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            window.location.href = 'index.html';
        }

        const params = new URLSearchParams(window.location.search);
        document.getElementById('cfName').value = params.get('name') || '';
        document.getElementById('cfContact').value = params.get('contactnumber') || '';
        document.getElementById('cfDate').value = params.get('journeydate') || '';
        document.getElementById('cfPersons').value = params.get('numberofpersons') || '';
        document.getElementById('cfPlace').value = params.get('place') || '';
        document.getElementById('cfDays').value = params.get('days') || '';

        async function handleConfirm(e) {
            e.preventDefault();
            const body = {
                place: document.getElementById('cfPlace').value,
                days: document.getElementById('cfDays').value,
                name: document.getElementById('cfName').value,
                contactnumber: document.getElementById('cfContact').value,
                journeydate: document.getElementById('cfDate').value,
                numberofpersons: document.getElementById('cfPersons').value
            };
            const res = await apiPost('/bookings/package', body);
            if (res.status === 'success') {
                window.location.href = 'UserTour.html?booking=success';
            } else {
                document.getElementById('confirmMsg').textContent = res.message || 'Booking failed';
            }
        }
    </script>
</body>
</html>
